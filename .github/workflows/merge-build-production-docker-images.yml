# Alexander Tebiev - https://github.com/beeyev
name: Build Production Docker Images

on:
  push:
    branches: [ master ]

  schedule:
    - cron: "23 1 2 * *"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  docker-image-deploy:
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        SOURCE_IMAGE_VERSION: [ '5.2-fpm-alpine' ]
        TARGET_IMAGE_VERSION: [ '5.2' ]
    uses: ./.github/workflows/callable-build-docker-image.yml
    name: Build Production Docker Images / ${{ matrix.SOURCE_IMAGE_VERSION }}-${{ matrix.TARGET_IMAGE_VERSION }}
    with:
      BASE_IMAGE_VERSION: ${{ matrix.SOURCE_IMAGE_VERSION }}
      DOCKER_REGISTRY_IMAGE: |
        ghcr.io/${{ github.repository_owner }}/phpmyadmin-docker-lightweight:latest
        ghcr.io/${{ github.repository_owner }}/phpmyadmin-docker-lightweight:${{ matrix.TARGET_IMAGE_VERSION }}
      DOCKERFILE_PATH: ./docker/Dockerfile
    secrets: inherit